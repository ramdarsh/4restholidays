<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4rest Holidays | Your Adventure Awaits</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@300;500;700;800&display=swap"
    rel="stylesheet">

  <style>
    :root {
      /* Deep Forest Green and Warm Sunlight Gold */
      --forest-dark: #081C15;
      --forest-green: #2D6A4F;
      --sun-gold: #E9C46A;
      --leaf-light: #B7E4C7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Anek Malayalam', sans-serif;
    }

    body {
      background-color: var(--forest-dark);
      color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* 1. Slow Zooming Forest Background Image */
    .bg-image {
      position: absolute;
      top: -5%;
      left: -5%;
      right: -5%;
      bottom: -5%;
      /* High-quality misty pine forest background */
      background-image: linear-gradient(rgba(8, 28, 21, 0.7), rgba(8, 28, 21, 0.8)), url('https://images.unsplash.com/photo-1448375240586-882707db888b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
      background-size: cover;
      background-position: center;
      z-index: -3;
      animation: slowZoom 25s ease-in-out infinite alternate;
    }

    /* 2. Animated Floating Fireflies / Light Dust */
    .firefly {
      position: absolute;
      background: radial-gradient(circle, rgba(233, 196, 106, 1) 0%, rgba(233, 196, 106, 0) 70%);
      border-radius: 50%;
      z-index: -2;
      opacity: 0;
      animation: floatFly 10s infinite ease-in;
    }

    .f1 {
      width: 15px;
      height: 15px;
      left: 15%;
      bottom: -10%;
      animation-delay: 0s;
      animation-duration: 12s;
    }

    .f2 {
      width: 10px;
      height: 10px;
      left: 85%;
      bottom: -10%;
      animation-delay: 3s;
      animation-duration: 15s;
    }

    .f3 {
      width: 20px;
      height: 20px;
      left: 50%;
      bottom: -10%;
      animation-delay: 5s;
      animation-duration: 18s;
    }

    .f4 {
      width: 12px;
      height: 12px;
      left: 30%;
      bottom: -10%;
      animation-delay: 7s;
      animation-duration: 14s;
    }

    /* Main Glassmorphism Container */
    .container {
      padding: 4rem 3rem 3rem;
      border: 1px solid rgba(233, 196, 106, 0.2);
      background: rgba(8, 28, 21, 0.65);
      /* Dark green tinted glass */
      border-radius: 16px;
      max-width: 800px;
      width: 90%;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(45, 106, 79, 0.2) inset;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(40px);
      animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* Top Accent Line */
    .accent-line {
      height: 4px;
      background: linear-gradient(90deg, var(--forest-green), var(--sun-gold), var(--forest-green));
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Typography Logo Area */
    .logo-area {
      margin-bottom: 2rem;
      animation: gentleFloat 6s ease-in-out infinite;
    }

    .logo-text {
      font-size: 4rem;
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .logo-text .number {
      color: var(--sun-gold);
      font-size: 5rem;
      /* Make the '4' pop */
    }

    .logo-text .rest {
      color: #ffffff;
    }

    .logo-text .holidays {
      color: var(--leaf-light);
      font-weight: 300;
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-left: 10px;
    }

    .tree-icon {
      font-size: 3rem;
      margin-right: 10px;
      filter: drop-shadow(0 0 10px rgba(45, 106, 79, 0.8));
    }

    h1 {
      font-size: 2.4rem;
      color: var(--sun-gold);
      font-weight: 700;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
    }

    p.subtitle {
      font-size: 1.25rem;
      color: #e0e0e0;
      margin-bottom: 2.5rem;
      line-height: 1.7;
      max-width: 650px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 300;
    }

    /* Nature-Themed Contact Button */
    .contact-btn {
      display: inline-block;
      background-color: var(--forest-green);
      color: #ffffff;
      padding: 15px 40px;
      text-decoration: none;
      font-weight: 500;
      font-size: 1.2rem;
      border-radius: 50px;
      letter-spacing: 1.5px;
      transition: all 0.3s ease;
      margin-bottom: 3rem;
      border: 1px solid var(--leaf-light);
      box-shadow: 0 0 20px rgba(45, 106, 79, 0.5);
    }

    .contact-btn:hover {
      background-color: var(--sun-gold);
      color: var(--forest-dark);
      border-color: var(--sun-gold);
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 25px rgba(233, 196, 106, 0.4);
    }

    footer {
      font-size: 1rem;
      color: #aaaaaa;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 1.5rem;
      font-weight: 300;
    }

    footer span {
      color: var(--leaf-light);
      font-weight: 700;
      letter-spacing: 2px;
    }

    /* --- KEYFRAME ANIMATIONS --- */

    @keyframes slowZoom {
      0% {
        transform: scale(1);
      }

      100% {
        transform: scale(1.1);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gentleFloat {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes floatFly {
      0% {
        transform: translateY(0) translateX(0) scale(0);
        opacity: 0;
      }

      20% {
        opacity: 0.8;
        transform: translateY(-20vh) translateX(20px) scale(1);
      }

      50% {
        opacity: 1;
        transform: translateY(-50vh) translateX(-20px) scale(1.2);
      }

      80% {
        opacity: 0.8;
        transform: translateY(-80vh) translateX(15px) scale(1);
      }

      100% {
        transform: translateY(-110vh) translateX(-10px) scale(0);
        opacity: 0;
      }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .logo-text {
        font-size: 3rem;
        flex-wrap: wrap;
      }

      .logo-text .number {
        font-size: 4rem;
      }

      .logo-text .holidays {
        font-size: 1.8rem;
        margin-left: 0;
      }

      h1 {
        font-size: 1.8rem;
      }

      p.subtitle {
        font-size: 1.1rem;
      }

      .container {
        padding: 3rem 1.5rem 2rem;
        width: 95%;
      }
    }
  </style>
</head>

<body>

  <div class="bg-image"></div>

  <div class="firefly f1"></div>
  <div class="firefly f2"></div>
  <div class="firefly f3"></div>
  <div class="firefly f4"></div>

  <div class="container">
    <div class="accent-line"></div>

    <div class="logo-area">
      <div class="logo-text">
        <span class="tree-icon">🌲</span>
        <div>
          <span class="number">4</span><span class="rest">REST</span>
        </div>
        <span class="holidays">HOLIDAYS</span>
      </div>
    </div>

    <h1>Your Next Adventure Awaits</h1>

    <p class="subtitle">We are currently blazing new trails for our website. 4rest Holidays will be launching soon to
      help you disconnect from the noise and reconnect with nature.</p>

    <a href="mailto:freelands1999@gmail.com" class="contact-btn">✉ Contact Us</a>

    <footer>
      <p>Developed by <span>RMSLABS</span></p>
    </footer>
  </div>

</body>

</html>
